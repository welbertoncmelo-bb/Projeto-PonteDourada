<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Profissionais</title>
    <link rel="stylesheet" href="estilos/estilo.css">
</head>

<body>
    <div class="principal">
        <div class="topo">
            <div class="topo-esquerda"></div>

            <div class="topo-centro">
                <h2>Cadastro de Profissionais</h2>
            </div>

            <div class="topo-direita">
                <a href="TelaPrincipal.html" class="btn-sair">
                    <img src="img/voltar.png">
                    <h5>voltar</h5>
                </a>
            </div>
        </div>
        <div class="logo">
            <img src="img/3.png" alt="imagem">
        </div>
        <form class="formulario">
            <div class="corpo">
                <label>Tipo Profissional</label>
                <input type="text" id="profissional" placeholder="digite o Tipo Profissional">
                <label>Conselho Registro</label>
                <input type="text" id="registro" placeholder="informe numero do registro">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="digite o CPF" maxlength="14">
                <input type="button" value="CADASTRAR" id="entrar" onclick="inserir('FormulariodeProfissionais.html')">
            </div>
        </form>
    </div>
    <script src="https://unpkg.com/imask"></script>
    <script src="scripts/funcao.js"></script>
</body>

</html>
