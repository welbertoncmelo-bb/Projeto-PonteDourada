<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Clientes</title>
    <link rel="stylesheet" href="estilos/estilo.css">
</head>

<body>
    <div class="principal">
        <div class="topo">
            <div class="topo-esquerda"></div>

            <div class="topo-centro">
                <h2>Cadastro de Clientes</h2>
            </div>

            <div class="topo-direita">
                <a href="TelaPrincipal.html" class="btn-sair">
                    <img src="img/voltar.png">
                    <h5>voltar</h5>
                </a>
            </div>
        </div>
        <div class="logo">
            <img src="img/3.png" alt="imagem">
        </div>

        <form class="cards">

            <div class="campo">
                <label>Nome</label>
                <input type="text" id="nome" placeholder="digite o nome">
            </div>

            <div class="campo">
                <label>CPF</label>
                <input type="text" id="cpf" placeholder="digite o CPF">
            </div>

            <div class="campo">
                <label>Tel. para Contato</label>
                <input type="text" id="tel" placeholder="digite o numero">
            </div>

            <div class="campo">
                <label>Data de Nascimento</label>
                <input type="date">
            </div>

            <div class="campo">
                <label>Sexo</label>
                <select id="status">
                    <option value="" disabled selected hidden>selecione</option>
                    <option value="m"><q>Masculino</q></option>
                    <option value="f"><q>Feminino</q></option>
                </select>
            </div>
            <div class="campo">
                <label>Filiação</label>
                <input type="text" id="filiacao" placeholder="digite o nome da Mãe">
            </div>
            <div class="campo">
                <label>Endereço</label>
                <input type="text" id="end" placeholder="digite o Endereço">
            </div>

            <div class="campo full">
                <label>Observações</label>
                <textarea placeholder="histórico"></textarea>
            </div>

            <div class="campo full">
                <input type="button" value="CADASTRAR" onclick="inserir('FormulariodeClientes.html')">
            </div>
        </form>
    </div>
    <script src="https://unpkg.com/imask"></script>
    <script src="scripts/funcao.js"></script>
</body>

</html>
